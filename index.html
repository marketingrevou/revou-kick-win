<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/png" href="assets/revou-logo.png">
<link rel="apple-touch-icon" href="assets/revou-logo.png">
<title>KICK &amp; WIN — RevoU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    /* Framed backdrop: navy radial glow so letterboxing reads as intentional. */
    background:
      radial-gradient(ellipse 120% 120% at 50% 38%, #1b2a63 0%, #101a44 42%, #0a1230 72%, #060a1e 100%);
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  canvas#game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #060a1e;
    cursor: pointer;
    /* Frame the screen like a mounted arcade panel. */
    border: 3px solid rgba(255, 222, 61, 0.28);
    border-radius: 14px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 18px 60px rgba(0,0,0,0.55),
      0 0 90px rgba(27, 42, 99, 0.65);
  }

  /* ---------- Loading ---------- */
  #loader {
    position: fixed; inset: 0; z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0b1230; color: #FFDE3D;
    font-size: 5vmin; letter-spacing: 2px; text-align: center;
  }
  #loader .bar { margin-top: 3vmin; width: 40vmin; height: 2.4vmin; border: 3px solid #FFDE3D; border-radius: 99px; overflow: hidden; }
  #loader .fill { height: 100%; width: 0%; background: #FFDE3D; transition: width .15s; }

  /* ---------- Mobile landscape gate ---------- */
  #rotate {
    position: fixed; inset: 0; z-index: 50;
    display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(6, 10, 30, 0.96);
    backdrop-filter: blur(6px);
    color: #FFDE3D; text-align: center; padding: 6vmin;
  }
  #rotate.show { display: flex; }
  .phone {
    width: 30vmin; height: 30vmin;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 5vmin;
  }
  .phone svg { width: 100%; height: 100%; animation: rot 2.2s ease-in-out infinite; transform-origin: 50% 50%; }
  @keyframes rot {
    0%, 18%   { transform: rotate(0deg); }
    42%, 78%  { transform: rotate(-90deg); }
    100%      { transform: rotate(0deg); }
  }
  #rotate h1 {
    font-size: 7vmin; color: #FFDE3D;
    text-shadow: 3px 3px 0 #141D45, -1px -1px 0 #141D45;
    letter-spacing: 2px;
  }
  #rotate p {
    font-size: 4vmin; color: #fff; margin-top: 2vmin; font-weight: bold;
    text-shadow: 2px 2px 0 #141D45;
  }

  /* ---------- Email gate popup ---------- */
  #emailGate {
    position: fixed; inset: 0; z-index: 60;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(6, 10, 30, 0.88);
    backdrop-filter: blur(6px);
    padding: 6vmin;
  }
  #emailGate.show { display: flex; }
  #emailCard {
    width: 100%; max-width: 480px;
    background: #141D45;
    border: 4px solid #FFDE3D;
    border-radius: 20px;
    padding: 34px 30px 30px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    font-family: Arial, sans-serif;
  }
  #emailCard h2 {
    font-family: 'Arial Black', Arial, sans-serif;
    color: #FFDE3D; font-size: 26px; letter-spacing: 1px;
    text-shadow: 2px 2px 0 #0b1230;
  }
  #emailCard p {
    color: #fff; font-size: 15px; margin-top: 12px; line-height: 1.4; font-weight: bold;
  }
  #emailInput {
    width: 100%; margin-top: 22px;
    padding: 14px 16px; font-size: 17px;
    border: 3px solid #FFDE3D; border-radius: 12px;
    background: #0b1230; color: #fff;
    outline: none; text-align: center;
    font-family: Arial, sans-serif;
  }
  #emailInput::placeholder { color: #7c86ad; }
  #emailInput:focus { box-shadow: 0 0 0 3px rgba(255,222,61,0.35); }
  #emailErr {
    color: #ff6b6b; font-size: 13px; margin-top: 10px; min-height: 16px; font-weight: bold;
  }
  #emailBtn {
    width: 100%; margin-top: 16px;
    padding: 15px; font-size: 18px; letter-spacing: 1px;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #141D45; background: #FFDE3D;
    border: none; border-radius: 99px; cursor: pointer;
    transition: transform .1s, opacity .2s;
  }
  #emailBtn:hover { transform: scale(1.03); }
  #emailBtn:disabled { opacity: 0.6; cursor: default; transform: none; }
  #emailNote { color: #7c86ad; font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="2148" height="1198"></canvas>
</div>

<!-- Intro visuals: looped, drawn onto the title canvas frame-by-frame. Hidden from layout. -->
<video id="introVid" src="assets/intro.mp4" loop muted playsinline preload="auto"
       style="position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; left:-9999px;"></video>

<div id="loader">
  <div>KICK &amp; WIN</div>
  <div class="bar"><div class="fill" id="loadfill"></div></div>
</div>

<div id="rotate">
  <div class="phone">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="34" y="14" width="32" height="60" rx="6" fill="none" stroke="#FFDE3D" stroke-width="4"/>
      <rect x="42" y="22" width="16" height="40" fill="#141D45" stroke="#FFDE3D" stroke-width="2"/>
      <circle cx="50" cy="68" r="2.4" fill="#FFDE3D"/>
      <!-- curved rotate arrow -->
      <path d="M20 86 A34 34 0 0 1 80 86" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="4 4"/>
      <path d="M80 86 l-2 -8 l8 3 z" fill="#fff"/>
    </svg>
  </div>
  <h1>PUTAR HP KAMU</h1>

</div>

<div id="emailGate">
  <div id="emailCard">
    <h2>MASUKKAN EMAIL KAMU</h2>
    <p>Daftar untuk mulai bermain &amp; klaim hadiahmu!</p>
    <input id="emailInput" type="email" inputmode="email" autocomplete="email"
           placeholder="nama@email.com" maxlength="120" />
    <div id="emailErr"></div>
    <button id="emailBtn">MULAI MAIN</button>
    <div id="emailNote">1 email = 1 kesempatan bermain</div>
  </div>
</div>

<script>
"use strict";
(function () {

/* ============================================================
   EMAIL GATE + UTM CAPTURE + GOOGLE SHEETS LOGGING
   ============================================================ */
// Apps Script Web App URL (deploy the Code.gs in APPS_SCRIPT.md, paste the /exec URL here).
const SHEETS_ENDPOINT = "https://script.google.com/macros/s/AKfycbz-t_gyKgEaatqDL9PmESPVS7_8joQa3sHFewl6hXBz3sZgNQT7lzQZuPZLfbYDOKHB/exec";

// Capture UTM params from the page URL once, at load.
const UTM = (function () {
  const q = new URLSearchParams(window.location.search);
  return {
    utm_campaign: q.get("utm_campaign") || "",
    utm_source:   q.get("utm_source")   || "",
    utm_medium:   q.get("utm_medium")   || "",
    utm_content:  q.get("utm_content")  || "",
  };
})();

// Player email is set once the gate is passed; used when logging the prize.
let PLAYER_EMAIL = "";
const USED_KEY = "kickwin_used_emails";

function usedEmails() {
  try { return JSON.parse(localStorage.getItem(USED_KEY) || "[]"); }
  catch (e) { return []; }
}
function markEmailUsed(email) {
  try {
    const list = usedEmails();
    if (!list.includes(email)) { list.push(email); localStorage.setItem(USED_KEY, JSON.stringify(list)); }
  } catch (e) {}
}
function isEmailUsed(email) { return usedEmails().includes(email); }
function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

// Fire-and-forget log to Google Sheets. Uses no-cors + urlencoded body so the
// Apps Script web app receives it without a CORS preflight.
function logToSheet(prize) {
  if (!SHEETS_ENDPOINT || SHEETS_ENDPOINT.indexOf("PASTE_") === 0) return;
  const body = new URLSearchParams({
    email: PLAYER_EMAIL,
    prize: prize || "",
    utm_campaign: UTM.utm_campaign,
    utm_source:   UTM.utm_source,
    utm_medium:   UTM.utm_medium,
    utm_content:  UTM.utm_content,
  });
  try {
    fetch(SHEETS_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: body.toString(),
    }).catch(() => {});
  } catch (e) {}
}

/* ============================================================
   CONSTANTS & GEOMETRY  (native canvas 2148 x 1198)
   All fractions copied from build_scripts/hud.py & cs_new.py
   ============================================================ */
const CW = 2148, CH = 1198;
const YELLOW = "#FFDE3D", NAVY = "#141D45", NAVY_D = "#0b1230", WHITE = "#ffffff";
const GREEN = "#3cd25a", RED = "#e83c3c";

// goal mouth
const GX0 = CW * 0.285, GX1 = CW * 0.715;
const GY0 = CH * 0.44,  GY1 = CH * 0.70;
const AIM_R = (GX1 - GX0) * 0.055;
const COL_FX = [0.15, 0.5, 0.85];      // within mouth
const ROW_FY = [0.24, 0.76];
// build the 6 aim zones (index 0..5 = row0 c0,c1,c2 then row1 c0,c1,c2)
const ZONES = [];
for (let ri = 0; ri < ROW_FY.length; ri++)
  for (let ci = 0; ci < COL_FX.length; ci++)
    ZONES.push({
      col: ci, row: ri,
      x: GX0 + (GX1 - GX0) * COL_FX[ci],
      y: GY0 + (GY1 - GY0) * ROW_FY[ri],
    });

// power bar
const PB_W = 58, PB_X = CW - 120, PB_Y0 = CH * 0.30, PB_Y1 = CH * 0.82;

// scoreboard
const SB_R = 34, SB_GAP = 130, SB_CY = 78;

// ball on the spot / keeper feet
const BALL_X = CW * 0.50, BALL_Y = CH * 0.923, BALL_R = CW * 0.033 / 2;
const KEEP_X = CW * 0.50, KEEP_FEET_Y = CH * 0.808;

/* ============================================================
   COUNTRY DATA + country-select grid geometry (from cs_new.py,
   canvas 1344x768 -> we scale hotspots to CW x CH)
   ============================================================ */
const COUNTRIES = [
  "norway","england","france","morocco","argentina","usa",
  "portugal","spain","belgium","switzerland","colombia","egypt"
];
const CNAME = {
  norway:"NORWAY", england:"ENGLAND", france:"FRANCE", morocco:"MOROCCO",
  argentina:"ARGENTINA", usa:"USA", portugal:"PORTUGAL", spain:"SPAIN",
  belgium:"BELGIUM", switzerland:"SWITZERLAND", colombia:"COLOMBIA", egypt:"EGYPT"
};

// Recompute the exact grid rects that cs_new.py drew (in 1344x768 space).
function computeSelectGrid() {
  const W = 1344, H = 768;
  const cols = 4, rows = 3;
  const grid_top = 118, grid_bottom = H - 62;
  const gutter = 40, name_h = 34, gap_y = 34, scale = 0.86;
  const grid_h = grid_bottom - grid_top;
  const side_margin = Math.floor(W * 0.05);
  const tile_h_max = Math.floor((grid_h - (rows - 1) * gap_y) / rows);
  let flag_h = tile_h_max - name_h;
  const flag_w_fit = Math.floor((W - 2 * side_margin - (cols - 1) * gutter) / cols);
  flag_h = Math.floor(Math.min(flag_h, Math.floor(flag_w_fit * 2 / 3)) * scale);
  const tile_w = Math.floor(flag_h * 3 / 2);
  const tile_h = flag_h + name_h;
  const row_w = cols * tile_w + (cols - 1) * gutter;
  const start_x = Math.floor((W - row_w) / 2);
  const start_y = grid_top + Math.floor((grid_h - (rows * tile_h + (rows - 1) * gap_y)) / 2);
  const rects = [];
  for (let i = 0; i < COUNTRIES.length; i++) {
    const c = i % cols, r = Math.floor(i / cols);
    const tx = start_x + c * (tile_w + gutter);
    const ty = start_y + r * (tile_h + gap_y);
    // scale from 1344x768 to CW x CH (the backdrop is drawn to fill the canvas)
    rects.push({
      country: COUNTRIES[i],
      x: tx / W * CW, y: ty / H * CH,
      w: tile_w / W * CW, h: tile_h / H * CH,
    });
  }
  return rects;
}
const SELECT_RECTS = computeSelectGrid();

/* ============================================================
   ASSET LOADING
   ============================================================ */
const IMG = {};
const ASSET_LIST = {
  title_bg:   "assets/title_background.png",
  logo:       "assets/logo_kickwin_final.png",
  revou:      "assets/revou-logo.png",
  select:     "assets/country_select.png",
  stadium:    "assets/stadium_empty.png",
  scene:      "assets/scene_clean.png",
  ball:       "assets/ball.png",
  // result cards are now re-drawn in code (over title_bg) for the staggered reveal —
  // the baked result_{1,2,3}of3.png are no longer loaded.
  k_idle:     "assets/keeper/idle.png",
  k_left:     "assets/keeper/dive_left.png",   // flipped in code for right dives
  k_jump:     "assets/keeper/jump.png",
};
COUNTRIES.forEach(c => ASSET_LIST["flag_" + c] = "assets/flags/f_" + c + ".png");

function loadAssets(onDone) {
  const keys = Object.keys(ASSET_LIST);
  let loaded = 0;
  const fill = document.getElementById("loadfill");
  keys.forEach(k => {
    const im = new Image();
    im.onload = im.onerror = () => {
      loaded++;
      fill.style.width = (loaded / keys.length * 100) + "%";
      if (loaded === keys.length) onDone();
    };
    im.src = ASSET_LIST[k];
    IMG[k] = im;
  });
}

/* ============================================================
   AUDIO — synth SFX (Web Audio API)
   ============================================================ */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === "suspended") AC.resume();
  return AC;
}
function tone(freq, dur, type = "square", vol = 0.2, slideTo = null) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
function noise(dur, vol = 0.25, filterFreq = 1000, sweepTo = null) {
  const ac = audio(); if (!ac) return;
  const n = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, n, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const flt = ac.createBiquadFilter(); flt.type = "bandpass";
  flt.frequency.setValueAtTime(filterFreq, ac.currentTime);
  if (sweepTo) flt.frequency.exponentialRampToValueAtTime(sweepTo, ac.currentTime + dur);
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  src.connect(flt); flt.connect(g); g.connect(ac.destination);
  src.start(); src.stop(ac.currentTime + dur);
}
const SFX = {
  click:  () => tone(520, 0.07, "square", 0.15),
  kick:   () => { tone(180, 0.1, "square", 0.3, 90); noise(0.08, 0.2, 800); },
  whoosh: () => noise(0.35, 0.15, 400, 2200),
  goal:   () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,"square",0.22),i*70)); setTimeout(()=>noise(0.5,0.15,1500),120); },
  save:   () => { tone(150, 0.25, "sawtooth", 0.3, 60); noise(0.12, 0.15, 300); },
};

/* ---- Sample-based SFX (AI-generated clips, decoded via the same AudioContext) ----
   Kept low under a master gain so they enrich, not overwhelm. Everything is gated
   behind audio() (first-gesture unlock). Clips fetch+decode lazily on unlock. */
const SND_SRC = {
  ambience: "assets/sfx/crowd_ambience.mp3",
  cheer:    "assets/sfx/cheer.mp3",
  groan:    "assets/sfx/groan.mp3",
  kick:     "assets/sfx/kick.mp3",
  whistle:  "assets/sfx/whistle.mp3",
  music:    "assets/sfx/menu_music.mp3",   // upbeat menu anthem (title -> VS)
  pop:      "assets/sfx/pop.mp3",           // friendly UI click (replaces synth beep)
  vs_swell: "assets/sfx/vs_swell.mp3",      // VS slam impact swell
};
const SND_GAIN = { ambience: 0.30, cheer: 0.55, groan: 0.5, kick: 0.6, whistle: 0.45, music: 0.34, pop: 0.5, vs_swell: 0.5 };
const SND = {};           // key -> AudioBuffer
let sndMaster = null;     // master GainNode (kept low)
let sndLoaded = false, sndLoading = false;
let ambienceNode = null;  // {src, gain} for the looping bed
let musicNode = null;     // {src, gain} for the looping menu music

function loadSamples() {
  const ac = audio(); if (!ac || sndLoaded || sndLoading) return;
  sndLoading = true;
  sndMaster = ac.createGain();
  sndMaster.gain.value = 0.5;               // global low ceiling
  sndMaster.connect(ac.destination);
  const keys = Object.keys(SND_SRC);
  let done = 0;
  keys.forEach(k => {
    fetch(SND_SRC[k]).then(r => r.arrayBuffer()).then(b => ac.decodeAudioData(b))
      .then(buf => {
        SND[k] = buf;
        // start the menu music as soon as its buffer is ready, if we're on a front screen
        if (k === "music" && (G.screen === "title" || G.screen === "select" || G.screen === "vs")) startMusic();
        if (k === "ambience" && (G.screen === "aim" || G.screen === "power" || G.screen === "shooting" || G.screen === "feedback" || G.screen === "result")) startAmbience();
      })
      .catch(() => {})
      .finally(() => { if (++done === keys.length) { sndLoaded = true; sndLoading = false; } });
  });
}
function playSample(key, { loop = false, gain = null } = {}) {
  const ac = audio(); if (!ac || !SND[key]) return null;
  const src = ac.createBufferSource(); src.buffer = SND[key]; src.loop = loop;
  const g = ac.createGain();
  g.gain.value = gain != null ? gain : (SND_GAIN[key] || 0.5);
  src.connect(g); g.connect(sndMaster || ac.destination);
  try { src.start(); } catch (e) {}
  return { src, gain: g };
}
function startAmbience() {
  if (ambienceNode || !SND.ambience) return;
  ambienceNode = playSample("ambience", { loop: true });
}
function stopAmbience() {
  if (!ambienceNode) return;
  const ac = audio();
  try {
    ambienceNode.gain.gain.setValueAtTime(ambienceNode.gain.gain.value, ac.currentTime);
    ambienceNode.gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
    ambienceNode.src.stop(ac.currentTime + 0.45);
  } catch (e) {}
  ambienceNode = null;
}
function startMusic() {
  if (musicNode || !SND.music) return;
  musicNode = playSample("music", { loop: true });
}
function stopMusic() {
  if (!musicNode) return;
  const ac = audio();
  try {
    musicNode.gain.gain.setValueAtTime(musicNode.gain.gain.value, ac.currentTime);
    musicNode.gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.5);
    musicNode.src.stop(ac.currentTime + 0.55);
  } catch (e) {}
  musicNode = null;
}
// convenience: real SFX layered at the right moments
const SND_PLAY = {
  cheer:   () => playSample("cheer"),
  groan:   () => playSample("groan"),
  kick:    () => playSample("kick"),
  whistle: () => playSample("whistle"),
  pop:     () => playSample("pop"),
  swell:   () => playSample("vs_swell"),
};
// nicer UI click: real pop if loaded, else fall back to the synth blip
function uiClick() { if (SND.pop) SND_PLAY.pop(); else SFX.click(); }

/* ============================================================
   GAME STATE
   ============================================================ */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// Intro video: looped visuals for the title screen, drawn onto the canvas.
const introVid = document.getElementById("introVid");
let introVidReady = false;
introVid.addEventListener("loadeddata", () => { introVidReady = true; });
// Kick off playback (muted + playsinline lets autoplay work on mobile). A user
// gesture also triggers this via the click/touch handlers, covering strict browsers.
function playIntroVid() { const p = introVid.play(); if (p && p.catch) p.catch(() => {}); }
playIntroVid();

const G = {
  screen: "title",         // title|select|vs|aim|power|shooting|feedback|result
  shooter: null,
  rival: null,
  shot: 0,                 // 0..2 (current shot index)
  results: [null, null, null], // 'goal'|'save' per shot
  score: 0,
  schedule: [],            // precomputed booleans (true=goal)
  target: 1,
  replayed: false,         // one-time replay used?
  // interaction
  hoverZone: -1,
  chosenZone: -1,
  power: 0,                // locked power 0..1
  // animation timers
  t: 0,                    // ms accumulator for current state
  // ball
  ball: { x: BALL_X, y: BALL_Y, tx: BALL_X, ty: BALL_Y, active: false, spin: 0 },
  // keeper
  keeper: { pose: "idle", dir: 0, anim: 0 }, // dir -1 left, 0 center, 1 right
  // fx
  particles: [],
  shake: 0,
  netRipple: 0,
  fbType: null,            // 'goal'|'save' during feedback
  // screen transition (fade) — 0..1 fresh-in
  transT: 0,
  prevScreen: null,
  // celebratory confetti (used on goal + result), independent of gameplay particles
  confetti: [],
};

function weightedTarget() {
  const r = Math.random();
  if (r < 0.50) return 1;
  if (r < 0.80) return 2;
  return 3;
}
function buildSchedule(target) {
  // choose which of the 3 shots are goals so sum == target, >=1 always
  const idx = [0, 1, 2];
  // shuffle
  for (let i = idx.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idx[i], idx[j]] = [idx[j], idx[i]];
  }
  const goalShots = new Set(idx.slice(0, target));
  return [0, 1, 2].map(i => goalShots.has(i));
}
function startNewGame() {
  G.shot = 0; G.results = [null, null, null]; G.score = 0;
  G.target = weightedTarget();
  G.schedule = buildSchedule(G.target);
  G.chosenZone = -1; G.hoverZone = -1; G.power = 0;
  G.particles = []; G.shake = 0; G.netRipple = 0;
}
function assignRival() {
  const others = COUNTRIES.filter(c => c !== G.shooter);
  G.rival = others[Math.floor(Math.random() * others.length)];
}

// expose engine for statistical verification
window.__rigTest = function (n) {
  const dist = { 1: 0, 2: 0, 3: 0 }; let minScore = 99;
  for (let i = 0; i < n; i++) {
    const t = weightedTarget();
    const sched = buildSchedule(t);
    const s = sched.filter(Boolean).length;
    dist[s] = (dist[s] || 0) + 1;
    minScore = Math.min(minScore, s);
  }
  return { n, dist, minScore, pct: { 1: dist[1]/n, 2: dist[2]/n, 3: dist[3]/n } };
};

function setScreen(s) {
  const prev = G.screen;
  G.prevScreen = prev;
  G.screen = s;
  G.t = 0;
  G.transT = 0;                 // start fade-in for the new screen

  // ---- menu music: plays on the front screens (title -> select -> vs) ----
  const wantMusic = (s === "title" || s === "select" || s === "vs");
  if (wantMusic) startMusic(); else stopMusic();

  // ---- ambience bed: on during gameplay + result, off elsewhere ----
  const wantAmb = (s === "aim" || s === "power" || s === "shooting" || s === "feedback" || s === "result");
  if (wantAmb) startAmbience(); else stopAmbience();

  // ---- kick-off whistle when the shootout actually begins ----
  if (s === "aim" && prev === "vs" && SND_PLAY.whistle) SND_PLAY.whistle();

  // ---- per-screen one-shot resets ----
  if (s === "vs") vsBangDone = false;
  if (s === "result") {
    G.confetti = []; resultCheer = false;
    // Log this play (Date, Email, Prize + UTM) to Google Sheets — once, on entry.
    logToSheet(prizeLabel(G.score));
  }
}

// Human-readable prize won for the given score (joined for a multi-prize win).
function prizeLabel(score) {
  const st = RESULT_STATES[score] || RESULT_STATES[1];
  return st.prizes.map(p => p[0]).join(" + ");
}

/* ============================================================
   DRAW HELPERS
   ============================================================ */
function drawImageFill(im, dx, dy, dw, dh) {
  // draw image to fill (cover) the target rect, preserving aspect
  if (!im.width) return;
  ctx.drawImage(im, dx, dy, dw, dh);
}
function drawVideoCover(vid, dx, dy, dw, dh) {
  // cover-fit the video into the target rect, cropping the overflow (no letterbox)
  const sw = vid.videoWidth, sh = vid.videoHeight;
  if (!sw || !sh) return;
  const scale = Math.max(dw / sw, dh / sh);
  const w = sw * scale, h = sh * scale;
  ctx.drawImage(vid, dx + (dw - w) / 2, dy + (dh - h) / 2, w, h);
}
function outlineText(txt, x, y, size, fill, ow, oc, align = "center", baseline = "middle") {
  ctx.font = "900 " + size + "px 'Arial Black', Arial, sans-serif";
  ctx.textAlign = align; ctx.textBaseline = baseline;
  ctx.fillStyle = oc || NAVY;
  for (let dx = -ow; dx <= ow; dx++)
    for (let dy = -ow; dy <= ow; dy++)
      if (dx*dx + dy*dy <= ow*ow) ctx.fillText(txt, x + dx, y + dy);
  ctx.fillStyle = fill;
  ctx.fillText(txt, x, y);
}
// word-wrap outlined text into `maxW`, centered, with `lineH` line spacing.
function wrapOutlineText(txt, x, y, maxW, lineH, size, fill, ow, oc) {
  ctx.font = "900 " + size + "px 'Arial Black', Arial, sans-serif";
  const words = txt.split(" ");
  const lines = [];
  let line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  const y0 = y - (lines.length - 1) * lineH / 2;
  lines.forEach((ln, i) => outlineText(ln, x, y0 + i * lineH, size, fill, ow, oc));
}
// pick current frame of a loop from a clock
function frameIndex(clockMs, frameCount, fps) {
  return Math.floor(clockMs / (1000 / fps)) % frameCount;
}
// easing
function easeOut(p) { return 1 - Math.pow(1 - p, 3); }
function easeOutBack(p) { const c = 1.70158; return 1 + (c + 1) * Math.pow(p - 1, 3) + c * Math.pow(p - 1, 2); }

let vsBangDone = false;   // one-shot flash/shake when the flags slam together

  // diagonal blue/red split accents

  ctx.fillStyle = "#2f6fd0";
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(CW*0.58,0); ctx.lineTo(CW*0.42,CH); ctx.lineTo(0,CH); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#b02a2a";

  ctx.shadowColor = YELLOW; ctx.shadowBlur = 40;
  ctx.fillStyle = NAVY; ctx.beginPath(); ctx.arc(bx, by, br, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;

/* Living crowd — GIF-STYLE: only the crowd moves, nothing else.
   Re-samples vertical slices of the already-drawn crowd band and nudges each up by a
   tiny amount QUANTIZED to a 3-frame loop (like a simple 3-frame pixel gif) at a slow
   ~4fps step, so it reads as gentle bobbing — never "jumping out of the seats". Groups
   of columns share a frame so neighbouring sections alternate (a soft wave). The goal
   mouth is clipped out so the net/keeper/ball are untouched. On a goal, a brief "roar"
   adds one extra step of lift + a faint warm flash. */
let crowdRoar = 0;            // 0..1, decays; bumped on a goal
const CROWD_Y0 = CH * 0.135, CROWD_Y1 = CH * 0.62;  // terraces band (above pitch)
const CROWD_FPS = 4;                                 // gif-like step rate
const CROWD_STEP = CH * 0.0016;                      // tiny per-frame lift (art-pixel sized)
function drawLiveCrowd() {
  const im = IMG.scene; if (!im || !im.width) return;
  const roar = crowdRoar;
  const cols = 40;
  const sliceW = CW / cols;
  const bandH = CROWD_Y1 - CROWD_Y0;
  const sxs = im.width / CW, sys = im.height / CH;
  // 3-frame vertical offsets: 0, 1, 2 steps up, then back — a stepped bob, not smooth
  const cycle = [0, 1, 2, 1];
  const baseFrame = frameIndex(animClock, cycle.length, CROWD_FPS);
  // Keep a static margin OUTSIDE the goal frame on both sides so the vertical posts
  // (which sit right at GX0/GX1) never shift with the crowd behind them.
  const postGap = CW * 0.035;
  const leftEnd = GX0 - postGap;          // left stand stops before the left post
  const rightStart = GX1 + postGap;       // right stand starts after the right post
  ctx.save();
  ctx.beginPath();
  // Only animate the LEFT and RIGHT stands, clear of the goal frame. The central column
  // (behind/above the goal) and the post margins are left untouched, so the whole goal
  // frame — crossbar and both posts — never moves with the crowd.
  ctx.rect(0, CROWD_Y0, leftEnd, bandH);
  ctx.rect(rightStart, CROWD_Y0, CW - rightStart, bandH);
  ctx.clip();
  for (let i = 0; i < cols; i++) {
    const cx = i * sliceW;
    // neighbouring groups of 4 columns are offset by 2 frames -> a soft alternating wave
    const grp = (i >> 2) % 2;
    const fi = cycle[(baseFrame + grp * 2) % cycle.length];
    const lift = (fi + (roar > 0 ? 1 : 0)) * CROWD_STEP;   // roar adds one extra step
    ctx.drawImage(im,
      cx * sxs, CROWD_Y0 * sys, sliceW * sxs, bandH * sys,
      cx, CROWD_Y0 - lift, sliceW + 1, bandH);
  }
  ctx.restore();
  // faint warm flash ONLY during a goal roar (no idle brightness pulse)
  if (roar > 0.02) {
    ctx.save();
    ctx.globalAlpha = roar * 0.10;
    ctx.fillStyle = "#fff2b0";
    ctx.fillRect(0, CROWD_Y0, CW, bandH);
    ctx.restore();
  }
}

function drawScoreboard() {

function ballDot(cx, cy, r, state) {
  ctx.fillStyle = "rgba(10,16,40,0.7)";
  ctx.beginPath(); ctx.arc(cx, cy, r + 8, 0, 7); ctx.fill();
  ctx.fillStyle = state === "pending" ? "rgba(230,230,235,1)" : "rgba(245,245,248,1)";
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.strokeStyle = NAVY; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.stroke();
  ctx.fillStyle = "#282c3c";
  ctx.beginPath(); ctx.arc(cx, cy, r*0.33, 0, 7); ctx.fill();
  if (state === "goal") {
    ctx.strokeStyle = GREEN; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(cx, cy, r+3, 0, 7); ctx.stroke();
    ctx.lineWidth = 11; ctx.beginPath();
    ctx.moveTo(cx - r*0.45, cy+2); ctx.lineTo(cx - r*0.08, cy + r*0.42); ctx.lineTo(cx + r*0.5, cy - r*0.42); ctx.stroke();
  } else if (state === "save") {
    ctx.strokeStyle = RED; ctx.lineWidth = 9;
    ctx.beginPath(); ctx.arc(cx, cy, r+3, 0, 7); ctx.stroke();
    const o = r*0.42; ctx.lineWidth = 11; ctx.beginPath();
    ctx.moveTo(cx-o, cy-o); ctx.lineTo(cx+o, cy+o); ctx.moveTo(cx-o, cy+o); ctx.lineTo(cx+o, cy-o); ctx.stroke();
  }
}

let powerPhase = 0;
function drawPowerBar() {
  // frame
  ctx.fillStyle = "rgba(10,16,40,0.8)";
  roundRect(PB_X - 10, PB_Y0 - 46, PB_W + 20, (PB_Y1 - PB_Y0) + 62, 18); ctx.fill();
  ctx.strokeStyle = NAVY; ctx.lineWidth = 5;
  roundRect(PB_X - 10, PB_Y0 - 46, PB_W + 20, (PB_Y1 - PB_Y0) + 62, 18); ctx.stroke();
  outlineText("PWR", PB_X + PB_W/2, PB_Y0 - 24, 34, YELLOW, 3, NAVY);
  // gradient fill green(bottom)->yellow->red(top)
  const grad = ctx.createLinearGradient(0, PB_Y1, 0, PB_Y0);
  grad.addColorStop(0, "#3cd25a"); grad.addColorStop(0.5, "#ffde3d"); grad.addColorStop(1, "#e83c3c");
  ctx.fillStyle = grad;
  ctx.fillRect(PB_X, PB_Y0, PB_W, PB_Y1 - PB_Y0);
  // oscillating marker (only while aiming/power sub-state)
  let p = G.chosenZone >= 0 ? oscValue() : oscValue();
  const my = PB_Y1 - (PB_Y1 - PB_Y0) * p;
  ctx.fillStyle = WHITE;
  ctx.fillRect(PB_X - 16, my - 9, PB_W + 32, 18);
  ctx.strokeStyle = NAVY; ctx.lineWidth = 4;
  ctx.strokeRect(PB_X - 16, my - 9, PB_W + 32, 18);
  ctx.fillStyle = YELLOW;
  ctx.beginPath();

}
function oscValue() {
  // 0..1 sine, ~1.5 Hz, only advances during aim/power
  return 0.5 + 0.5 * Math.sin(powerPhase);
}

// AI keeper sprites (trimmed to content bbox -> bottom = feet)
const KEEP_IDLE_H = CH * 0.255;   // idle sprite height on screen (matches baked scale)
function spriteWH(im, targetH) {
  const sc = targetH / im.height;
  return { w: im.width * sc, h: targetH };
}
function drawKeeperSprite(im, cx, feetY, targetH, rot, flip, shadow, sx, sy) {
  if (!im || !im.width) return;
  const { w, h } = spriteWH(im, targetH);
  const scX = sx || 1, scY = sy || 1;   // non-uniform squash/stretch (feet stay planted)
  ctx.save();
  ctx.translate(cx, feetY);
  // ground contact shadow (drawn before rotate/flip so it stays flat on the pitch).
  // Widen the shadow with the body's horizontal squash so it feels grounded.
  if (shadow !== false) {
    ctx.fillStyle = "rgba(0,0,0,0.30)";
    ctx.beginPath(); ctx.ellipse(0, 0, w * 0.34 * scX, h * 0.05, 0, 0, 7); ctx.fill();
  }
  if (rot) ctx.rotate(rot);
  if (flip) ctx.scale(-1, 1);
  // Draw from the feet (y=0) upward, so scaling height keeps the boots planted.
  ctx.drawImage(im, -w / 2 * scX, -h * scY, w * scX, h * scY);
  ctx.restore();
}

function drawKeeper() {
  const k = G.keeper;
  // Background (scene_clean.png) has NO baked keeper/ball, so no masking needed —
  // the sprite keeper is the only keeper.

  if (k.pose !== "dive") {
    // ---- IDLE: "ready to catch" bounce, feet planted ----
    // A 3-phase toe-bounce built from the single idle sprite: stand -> slight-ready ->
    // deep-ready -> back. Each phase squashes the body vertically (knees bending) and
    // widens it a touch (weight settling), while the feet stay locked to KEEP_FEET_Y.
    // Because drawKeeperSprite draws upward from the feet, a vertical squash lowers the
    // torso/head without lifting the boots — so he bobs down onto his toes, not floats.
    const t = animClock / 1000;
    // Eased triangle wave over ~1.6s: 0 (stand) -> 1 (deep crouch) -> 0.
    const cycle = (Math.sin(t * (Math.PI * 2 / 1.6) - Math.PI / 2) + 1) / 2; // 0..1..0
    const crouch = cycle * cycle * (3 - 2 * cycle);        // smoothstep for a springy settle
    const sy = 1 - crouch * 0.045;                         // squash down up to 4.5%
    const sx = 1 + crouch * 0.030;                         // widen up to 3% as he bends
    drawKeeperSprite(IMG.k_idle, KEEP_X, KEEP_FEET_Y, KEEP_IDLE_H, 0, false, true, sx, sy);
    return;
  }

  // ---- DIVE: move toward the reach target (covers top OR bottom corners) ----
  const p = Math.min(1, k.anim);
  const e = 1 - Math.pow(1 - p, 3);            // ease-out

  if (k.dir === 0) {
    // center: jump straight up (high for a top shot, small hop for a low one)
    const jump = (k.topShot ? CH * 0.14 : CH * 0.03) * Math.sin(p * Math.PI * 0.75) * 1.3;
    drawKeeperSprite(IMG.k_jump, KEEP_X, KEEP_FEET_Y - jump, KEEP_IDLE_H * (1 + 0.06 * e), 0, false, false);
    return;
  }

  // Side dive: use the clean dive_left sprite for BOTH sides; flip it for the right.
  // Reach horizontally toward the target column, and lift the keeper's "feet" point up so
  // his stretched body covers the corner — much higher for a top-row shot.
  const dx = (k.reachX - KEEP_X) * e;
  const topLift  = CH * 0.20;   // full airborne stretch toward a top corner
  const lowLift  = CH * 0.05;   // low, along the ground for a bottom corner
  const lift = (k.topShot ? topLift : lowLift) * Math.sin(p * Math.PI * 0.8) * 1.25;
  const rot  = k.dir * (k.topShot ? 0.05 : 0.18) * e;  // low dives lean more horizontal
  const diveH = KEEP_IDLE_H * 0.82;
  drawKeeperSprite(IMG.k_left, KEEP_X + dx, KEEP_FEET_Y - lift, diveH, rot, k.dir > 0, false);
}

function drawBall() {
  const b = G.ball;
  const im = IMG.ball;
  // ground shadow at the ball's resting spot (shrinks as the ball rises in flight)
  const airLift = Math.max(0, BALL_Y - b.y);
  const shScale = Math.max(0.4, 1 - airLift / (CH * 0.25));
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(b.x, BALL_Y + BALL_R * 0.5, BALL_R * 1.1 * shScale, BALL_R * 0.35 * shScale, 0, 0, 7);
  ctx.fill();
  ctx.restore();

  if (im && im.width) {
    const d = BALL_R * 2.1;   // sprite diameter
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.spin || 0);
    ctx.drawImage(im, -d / 2, -d / 2, d, d);
    ctx.restore();
  } else {
    // fallback code-drawn ball
    ctx.save();
    ctx.fillStyle = WHITE;
    ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, 7); ctx.fill();
    ctx.strokeStyle = "#333"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, 7); ctx.stroke();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of G.particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.s, p.s);
  }
  ctx.globalAlpha = 1;
}
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * 7, sp = 4 + Math.random() * 14;
    G.particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 4,
      s: 6 + Math.random()*10, color, life: 700 + Math.random()*400, max: 900
    });
  }
}

// ---- celebratory confetti (goal + prize reveal) ----
const CONF_COLORS = ["#FFDE3D", "#ffffff", "#3cd25a", "#e83c3c", "#2f6fd0", "#ff9f1c"];
function spawnConfetti(n, fromTop) {
  for (let i = 0; i < n; i++) {
    const x = Math.random() * CW;
    const y = fromTop ? -Math.random() * CH * 0.3 : CH * (0.25 + Math.random() * 0.2);
    G.confetti.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: fromTop ? 2 + Math.random() * 3 : -6 - Math.random() * 5,
      s: 10 + Math.random() * 14,
      rot: Math.random() * 7, vr: (Math.random() - 0.5) * 0.4,
      color: CONF_COLORS[(Math.random() * CONF_COLORS.length) | 0],
      seed: Math.random() * 1000,
      life: 2200 + Math.random() * 1500, max: 3700,
    });
  }
}
function drawConfetti() {
  for (const c of G.confetti) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, c.life / 500));
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    // flutter: squash width by rotation so it reads like a spinning paper flake
    ctx.fillRect(-c.s / 2, -c.s / 4, c.s * Math.abs(Math.cos(c.rot)) * 0.9 + 2, c.s / 2);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawFeedback() {
  // Keep the LIVE scene (new keeper mid-dive, ball, particles) and draw only the
  // feedback decorations in code — do NOT overlay the baked feedback PNG, which has
  // the old keeper + whole scene baked in and would hide the animated keeper.
  drawScene();

  const goal = G.fbType === "goal";
  // colored flash tint that fades over the first ~500ms
  const flash = Math.max(0, 1 - G.t / 500);
  if (flash > 0) {
    ctx.save();
    ctx.globalAlpha = flash * 0.35;
    ctx.fillStyle = goal ? "#2fbf4f" : "#d23a3a";
    ctx.fillRect(0, 0, CW, CH);
    ctx.restore();
  }

  // punch-in scale on the TEXT only
  const p = Math.min(1, G.t / 220);
  const sc = 0.7 + 0.3 * (1 - Math.pow(1 - p, 3));
  const overshoot = 1 + Math.max(0, Math.sin(p * Math.PI)) * 0.06;
  ctx.save();
  ctx.translate(CW / 2, CH * 0.24);
  ctx.scale(sc * overshoot, sc * overshoot);
  if (goal) {
    outlineText("GOOOAL!", 0, 0, 150, YELLOW, 6, NAVY);
    outlineText("+1", 0, CH * 0.13, 80, "#7CFF9A", 5, NAVY);
  } else {
    outlineText("SAVED!", 0, 0, 150, WHITE, 6, NAVY);
    outlineText("COBA LAGI", 0, CH * 0.12, 66, "#FF6B6B", 5, NAVY);
  }
  ctx.restore();

  scanlines();
}

/* Prize reveal — re-drawn in code (ported from build_scripts/result.py) over the
   stadium/trophy backdrop, so each piece can pop in on its own timeline:
   flash → headline → score dots tick in → panel scales in → prize rows pop one-by-one
   (each stamping a checkmark) → confetti → MAIN LAGI button fades in last. */
const RESULT_STATES = {
  0: { headline: "SAYANG!",  dots: ["save","save","save"],
       prizes: [] },
  1: { headline: "GOAL!",    dots: ["goal","save","save"],
       prizes: [["AI FREE LEARNING","ai"], ["REVOU STARTER KIT","box"]] },
  2: { headline: "GOOOAL!",  dots: ["goal","goal","save"],
       prizes: [["BNSP CERTIFICATION","cert"], ["REVOU STARTER KIT","box"]] },
  3: { headline: "PERFECT!", dots: ["goal","goal","goal"],
       prizes: [["BNSP CERTIFICATION","cert"], ["AI FREE LEARNING","ai"], ["REVOU STARTER KIT","box"]] },
};
let resultCheer = false;
// reveal timeline offsets (ms)
const R_HEAD = 150, R_DOTS = 500, R_PANEL = 850, R_ROW0 = 1150, R_ROW_GAP = 260, R_BTN_AFTER = 300;

function ballDotResult(cx, cy, r, state, appear) {
  ctx.save();
  ctx.translate(cx, cy); ctx.scale(appear, appear); ctx.translate(-cx, -cy);
  ctx.fillStyle = "rgba(245,245,248,1)";
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.strokeStyle = NAVY; ctx.lineWidth = 6; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.stroke();
  ctx.fillStyle = "#282c3c"; ctx.beginPath(); ctx.arc(cx, cy, r*0.34, 0, 7); ctx.fill();
  if (state === "goal") {
    ctx.strokeStyle = GREEN; ctx.lineWidth = 8; ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, 7); ctx.stroke();
    ctx.lineWidth = 9; ctx.beginPath();
    ctx.moveTo(cx-r*0.45, cy+2); ctx.lineTo(cx-r*0.08, cy+r*0.42); ctx.lineTo(cx+r*0.5, cy-r*0.42); ctx.stroke();
  } else {
    ctx.strokeStyle = RED; ctx.lineWidth = 8; ctx.beginPath(); ctx.arc(cx, cy, r+4, 0, 7); ctx.stroke();
    const o = r*0.4; ctx.lineWidth = 9; ctx.beginPath();
    ctx.moveTo(cx-o,cy-o); ctx.lineTo(cx+o,cy+o); ctx.moveTo(cx-o,cy+o); ctx.lineTo(cx+o,cy-o); ctx.stroke();
  }
  ctx.restore();
}

function drawPrizeIcon(cx, cy, kind, iconR) {
  const s = iconR * 1.4;
  ctx.lineJoin = "round";
  if (kind === "cert") {
    const w = s*0.92, h = s*1.05;
    ctx.fillStyle = WHITE; ctx.strokeStyle = NAVY; ctx.lineWidth = 5;
    roundRect(cx-w, cy-h, w*2, h*2, 10); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = "#8894a6"; ctx.lineWidth = 5;
    for (let k = 0; k < 3; k++) { const yy = cy-h*0.5+k*h*0.34; ctx.beginPath(); ctx.moveTo(cx-w*0.6, yy); ctx.lineTo(cx+w*0.6, yy); ctx.stroke(); }
    const sr = s*0.34, scx = cx-w*0.30, scy = cy+h*0.42;
    ctx.fillStyle = "#e83c3c"; ctx.strokeStyle = NAVY; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(scx-sr*0.4,scy+sr); ctx.lineTo(scx-sr*0.9,scy+sr*2.0); ctx.lineTo(scx-sr*0.05,scy+sr*1.4); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(scx+sr*0.4,scy+sr); ctx.lineTo(scx+sr*0.9,scy+sr*2.0); ctx.lineTo(scx+sr*0.05,scy+sr*1.4); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = YELLOW; ctx.strokeStyle = NAVY; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(scx, scy, sr, 0, 7); ctx.fill(); ctx.stroke();
  } else if (kind === "box") {
    const w = s*0.95, h = s*0.85, top = cy-h*0.35;
    ctx.strokeStyle = NAVY; ctx.lineWidth = 5;
    ctx.fillStyle = "#e83c50"; ctx.fillRect(cx-w, top, w*2, (cy+h)-top); ctx.strokeRect(cx-w, top, w*2, (cy+h)-top);
    ctx.fillStyle = "#ff789c"; ctx.fillRect(cx-w*1.08, top-h*0.28, w*2.16, h*0.28); ctx.strokeRect(cx-w*1.08, top-h*0.28, w*2.16, h*0.28);
    ctx.fillStyle = YELLOW; ctx.lineWidth = 4;
    ctx.fillRect(cx-w*0.15, top-h*0.28, w*0.30, (cy+h)-(top-h*0.28)); ctx.strokeRect(cx-w*0.15, top-h*0.28, w*0.30, (cy+h)-(top-h*0.28));
    const br = s*0.30;
    ctx.beginPath(); ctx.ellipse(cx-w*0.15-br*0.8, top-h*0.28-br*0.6, br*0.8, br*0.8, 0, 0, 7); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx+w*0.15+br*0.8, top-h*0.28-br*0.6, br*0.8, br*0.8, 0, 0, 7); ctx.fill(); ctx.stroke();
  } else { // ai lightbulb
    const r2 = s*0.82;
    ctx.strokeStyle = NAVY; ctx.lineWidth = 5;
    ctx.fillStyle = "#78c8ff";
    ctx.beginPath(); ctx.ellipse(cx, cy-r2*0.25, r2*0.75, r2*0.75, 0, 0, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#b4b4be"; ctx.fillRect(cx-r2*0.32, cy+r2*0.2, r2*0.64, r2*0.52); ctx.strokeRect(cx-r2*0.32, cy+r2*0.2, r2*0.64, r2*0.52);
    ctx.fillStyle = "#8894a6"; ctx.fillRect(cx-r2*0.32, cy+r2*0.72, r2*0.64, r2*0.23); ctx.strokeRect(cx-r2*0.32, cy+r2*0.72, r2*0.64, r2*0.23);
    ctx.strokeStyle = YELLOW; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(cx, cy-r2*0.5); ctx.lineTo(cx, cy+r2*0.15); ctx.stroke();
    ctx.lineWidth = 5;
    [[cx-r2*1.15, cy-r2*0.6, r2*0.26],[cx-r2*0.9, cy+r2*0.55, r2*0.18]].forEach(([sx,sy,ss]) => {
      ctx.beginPath(); ctx.moveTo(sx-ss,sy); ctx.lineTo(sx+ss,sy); ctx.moveTo(sx,sy-ss); ctx.lineTo(sx,sy+ss); ctx.stroke();
    });
  }
}

// PLAY AGAIN button rect (shared by draw + hit test)
function resultButtonRect() {
  const st = RESULT_STATES[G.score] || RESULT_STATES[1];
  const nP = st.prizes.length;
  const pw = CW*0.70, ph = CH*(0.22 + 0.135*nP);
  const py = (nP < 3 ? CH*0.30 : CH*0.285);
  const bw = CW*0.28, bh = CH*0.08, bx = (CW-bw)/2, by = py + ph + CH*0.03;
  return { bx, by, bw, bh, pw, ph, py };
}

function drawResult() {
  const st = RESULT_STATES[G.score] || RESULT_STATES[1];
  const nP = st.prizes.length;
  const t = G.t;

  // backdrop = stadium/trophy (reuse title bg), dimmed like the mockup
  drawImageFill(IMG.title_bg, 0, 0, CW, CH);
  ctx.fillStyle = "rgba(6,10,30,0.42)"; ctx.fillRect(0, 0, CW, CH);

  // opening flash
  if (t < 350) { ctx.save(); ctx.globalAlpha = (1 - t/350) * 0.5; ctx.fillStyle = "#fff"; ctx.fillRect(0,0,CW,CH); ctx.restore(); }

  // ---- headline (punch-in) ----
  const hP = Math.min(1, Math.max(0, (t - R_HEAD) / 300));
  if (hP > 0) {
    const sc = 0.6 + 0.4 * easeOutBack(hP);
    ctx.save(); ctx.globalAlpha = Math.min(1, hP*1.5);
    ctx.translate(CW/2, CH*0.095); ctx.scale(sc, sc);
    outlineText(st.headline, 0, 0, Math.round(CH*0.11), YELLOW, 7, NAVY);
    ctx.restore();
  }

  // ---- score line + dots ----
  const dP = Math.min(1, Math.max(0, (t - R_DOTS) / 400));
  if (dP > 0) {
    ctx.save(); ctx.globalAlpha = dP;
    outlineText("SKOR KAMU:  " + G.score + " / 3", CW/2, CH*0.205, Math.round(CH*0.05), WHITE, 5, NAVY);
    ctx.restore();
    const r = CH*0.022, gap = r*3.4, cy = CH*0.265, cx0 = CW/2 - gap;
    for (let i = 0; i < 3; i++) {
      const da = Math.min(1, Math.max(0, (t - (R_DOTS + i*140)) / 260));
      if (da > 0) ballDotResult(cx0 + i*gap, cy, r, st.dots[i], easeOutBack(da));
    }
  }

  // ---- prize panel (scale-in) ----
  const pw = CW*0.70, ph = CH*(0.22 + 0.135*nP), px = (CW-pw)/2;
  const py = (nP < 3 ? CH*0.30 : CH*0.285);
  const paP = Math.min(1, Math.max(0, (t - R_PANEL) / 320));
  if (paP > 0 && nP > 0) {
    const psc = 0.7 + 0.3 * easeOutBack(paP);
    ctx.save(); ctx.globalAlpha = paP;
    ctx.translate(px + pw/2, py + ph/2); ctx.scale(psc, psc); ctx.translate(-(px + pw/2), -(py + ph/2));
    // panel
    ctx.fillStyle = "rgba(14,20,52,0.94)"; roundRect(px, py, pw, ph, 40); ctx.fill();
    ctx.strokeStyle = YELLOW; ctx.lineWidth = 8; roundRect(px, py, pw, ph, 40); ctx.stroke();
    // yellow header bar
    const rh = ph*0.15;
    ctx.fillStyle = YELLOW; roundRect(px, py, pw, rh, 40); ctx.fill(); ctx.fillRect(px, py+rh-40, pw, 40);
    outlineText("KAMU MENANG!", px+pw/2, py+rh/2, Math.round(rh*0.55), NAVY, 0, NAVY);
    ctx.restore();

    // ---- prize rows (each pops in after the panel) ----
    const bodyTop = py + rh, bodyH = ph - rh, rowH = bodyH/nP;
    const iconR = rowH*0.30, lx = px + pw*0.11;
    for (let i = 0; i < nP; i++) {
      const rowP = Math.min(1, Math.max(0, (t - (R_ROW0 + i*R_ROW_GAP)) / 320));
      if (rowP <= 0) continue;
      const ry = bodyTop + i*rowH + rowH/2;
      const slide = (1 - easeOut(rowP)) * CW * 0.06;   // slide in from the right a touch
      ctx.save(); ctx.globalAlpha = rowP; ctx.translate(slide, 0);
      // green checkmark badge (stamp overshoot)
      const cr = iconR*0.7, stampSc = easeOutBack(rowP);
      ctx.save(); ctx.translate(lx, ry); ctx.scale(stampSc, stampSc); ctx.translate(-lx, -ry);
      ctx.fillStyle = GREEN; ctx.beginPath(); ctx.arc(lx, ry, cr, 0, 7); ctx.fill();
      ctx.strokeStyle = WHITE; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(lx, ry, cr, 0, 7); ctx.stroke();
      ctx.lineWidth = 8; ctx.beginPath();
      ctx.moveTo(lx-cr*0.42, ry+cr*0.05); ctx.lineTo(lx-cr*0.05, ry+cr*0.42); ctx.lineTo(lx+cr*0.5, ry-cr*0.4); ctx.stroke();
      ctx.restore();
      // prize icon
      const icx = lx + pw*0.11;
      drawPrizeIcon(icx, ry, st.prizes[i][1], iconR);
      // label (auto-shrink to fit)
      const textX = icx + pw*0.09, maxW = (px + pw - 40) - textX;
      let fsz = Math.round(rowH*0.26);
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.font = "900 " + fsz + "px 'Arial Black', Arial, sans-serif";
      while (ctx.measureText(st.prizes[i][0]).width > maxW && fsz > 12) { fsz -= 2; ctx.font = "900 " + fsz + "px 'Arial Black', Arial, sans-serif"; }
      ctx.fillStyle = WHITE; ctx.fillText(st.prizes[i][0], textX, ry);
      ctx.restore();
    }
  }

  // ---- confetti + cheer once all rows shown ----
  const allRowsAt = R_ROW0 + nP*R_ROW_GAP;
  if (t >= allRowsAt && !resultCheer && nP > 0) {
    resultCheer = true;
    spawnConfetti(90, true);
    if (SND_PLAY.cheer) SND_PLAY.cheer();
  }
  drawConfetti();

  // ---- footer: replay (only on a 0-goal miss) OR claim instructions (any prize) ----
  // Replay is offered exactly once, and only when the player scored nothing.
  const canReplay = (G.score === 0 && !G.replayed);
  const bw = CW*0.28, bh = CH*0.08, bx = (CW-bw)/2, by = py + ph + CH*0.03;
  const btnP = Math.min(1, Math.max(0, (t - (allRowsAt + R_BTN_AFTER)) / 320));
  if (btnP > 0) {
    ctx.save(); ctx.globalAlpha = btnP;
    if (canReplay) {
      // encouraging line above the button
      outlineText("Kamu punya 1 kesempatan lagi!", CW/2, by - CH*0.055,
        Math.round(CH*0.042), YELLOW, 5, NAVY);
      const bp = 1 + Math.sin(animClock/300) * 0.02;   // gentle pulse to invite the tap
      ctx.save();
      ctx.translate(CW/2, by+bh/2); ctx.scale(bp, bp); ctx.translate(-CW/2, -(by+bh/2));
      ctx.fillStyle = YELLOW; roundRect(bx, by, bw, bh, bh/2); ctx.fill();
      ctx.strokeStyle = NAVY; ctx.lineWidth = 7; roundRect(bx, by, bw, bh, bh/2); ctx.stroke();
      outlineText("MAIN LAGI", CW/2, by + bh/2, Math.round(bh*0.44), NAVY, 0, NAVY);
      ctx.restore();
    } else {
      // Won a prize (or replay already used): show how to claim it. No button.
      const claim = "Klaim hadiahmu dengan menunjukkan hasil ini ke Admission Counselor kamu.";
      const cy = by + bh*0.4, cw = pw, csz = Math.round(CH*0.038);
      wrapOutlineText(claim, CW/2, cy, cw, csz*1.35, csz, YELLOW, 5, NAVY);
    }
    ctx.restore();
  }

  scanlines();
}

/* ============================================================
   small path helpers + scanlines
   ============================================================ */
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function scanlines() {
  ctx.save();
  ctx.globalAlpha = 0.06; ctx.fillStyle = "#000";
  for (let y = 0; y < CH; y += 4) ctx.fillRect(0, y, CW, 2);
  ctx.restore();
}

/* ============================================================
   SHOT SEQUENCE
   ============================================================ */
function lockZone(zoneIdx) {
  G.chosenZone = zoneIdx;
  uiClick();
  setScreen("power");
}
function lockPower() {
  G.power = oscValue();
  SFX.kick();
  if (SND_PLAY.kick) SND_PLAY.kick();   // real ball-strike thump layered under the synth
  fireShot();
}
function fireShot() {
  const z = ZONES[G.chosenZone];
  const b = G.ball;
  b.sx = BALL_X; b.sy = BALL_Y;
  b.tx = z.x; b.ty = z.y;
  b.active = true;
  b.spin = 0;
  b.spinDir = z.x < BALL_X ? -1 : 1;   // spin matches travel direction
  // keeper decision from rigged schedule (decoupled from aim)
  const willGoal = G.schedule[G.shot];
  const k = G.keeper;
  if (willGoal) {
    // GOAL: keeper commits the WRONG way — dive toward a different corner than the ball.
    // horizontal: opposite side of the aimed column (center shots -> random side).
    const wrongCol = z.col === 1 ? (Math.random() < 0.5 ? 0 : 2) : (2 - z.col);
    k.dir = wrongCol === 0 ? -1 : wrongCol === 2 ? 1 : 0;
    // aim the keeper at the wrong corner (opposite column, opposite-ish height)
    k.reachX = ZONES.find(zz => zz.col === wrongCol && zz.row === (1 - z.row))
             ? ZONES.find(zz => zz.col === wrongCol && zz.row === (1 - z.row)).x : KEEP_X;
    k.reachY = z.row === 0 ? GY1 : GY0;   // if ball goes high, keeper goes low, and vice-versa
  } else {
    // SAVE: keeper reaches the EXACT aimed zone (covers top or bottom corner properly).
    k.dir = z.col === 0 ? -1 : z.col === 2 ? 1 : 0;
    k.reachX = z.x;
    k.reachY = z.y;
  }
  k.topShot = (z.row === 0);   // reaching a top zone -> full airborne stretch
  k.pose = "dive"; k.anim = 0;
  G.willGoal = willGoal;
  SFX.whoosh();
  setScreen("shooting");
}
function resolveShot() {
  const goal = G.willGoal;
  G.results[G.shot] = goal ? "goal" : "save";
  if (goal) G.score++;
  G.fbType = goal ? "goal" : "save";
  G.shake = goal ? 26 : 16;
  if (goal) {
    G.netRipple = 1;
    spawnBurst(G.ball.x, G.ball.y, YELLOW, 40);
    spawnConfetti(70, true);          // celebration rain
    crowdRoar = 1;                    // crowd leaps up
    SFX.goal();
    if (SND_PLAY.cheer) SND_PLAY.cheer();
  } else {
    spawnBurst(G.ball.x, G.ball.y, "#ddd", 24);
    crowdRoar = Math.max(crowdRoar, 0.25);   // small murmur, not a roar
    SFX.save();
    if (SND_PLAY.groan) SND_PLAY.groan();
  }
  setScreen("feedback");
}
function afterFeedback() {
  G.ball.active = false;
  G.ball.x = BALL_X; G.ball.y = BALL_Y; G.ball.spin = 0;
  G.keeper.pose = "idle"; G.keeper.dir = 0; G.keeper.anim = 0;
  G.shot++;
  if (G.shot >= 3) {
    setScreen("result");
  } else {
    G.chosenZone = -1; G.hoverZone = -1;
    setScreen("aim");
  }
}

/* ============================================================
   UPDATE (per frame)
   ============================================================ */
let animClock = 0;   // continuous clock for idle keeper breathing
function update(dt) {
  G.t += dt;
  animClock += dt;
  // screen fade-in
  if (G.transT < 1) G.transT = Math.min(1, G.transT + dt / 380);
  // oscillator advances only during aim/power
  if (G.screen === "aim" || G.screen === "power") powerPhase += dt / 1000 * Math.PI * 3;

  // decay fx
  if (G.shake > 0) G.shake = Math.max(0, G.shake - dt * 0.06);
  if (G.netRipple > 0) G.netRipple = Math.max(0, G.netRipple - dt * 0.003);
  if (crowdRoar > 0) crowdRoar = Math.max(0, crowdRoar - dt * 0.0006);
  for (const p of G.particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life -= dt;
  }
  G.particles = G.particles.filter(p => p.life > 0);

  // confetti (celebration) — gentle fall + flutter + spin
  for (const c of G.confetti) {
    c.x += c.vx; c.y += c.vy; c.vy += 0.06; c.vx += Math.sin((animClock + c.seed) / 300) * 0.05;
    c.rot += c.vr; c.life -= dt;
  }
  G.confetti = G.confetti.filter(c => c.life > 0 && c.y < CH + 40);

  if (G.screen === "shooting") {
    const b = G.ball;
    const dur = 420 - G.power * 120;      // higher power = faster
    const p = Math.min(1, G.t / dur);
    const e = p;
    b.x = b.sx + (b.tx - b.sx) * e;
    // arc: parabola up then to target
    b.y = b.sy + (b.ty - b.sy) * e - Math.sin(p * Math.PI) * CH * 0.12;
    // spin the ball as it flies (feels alive)
    b.spin += (b.spinDir || 1) * dt / 1000 * 22;
    // trail
    if (Math.random() < 0.5) G.particles.push({ x: b.x, y: b.y, vx: 0, vy: 0, s: 6, color: "rgba(255,255,255,0.6)", life: 200, max: 200 });
    // keeper dive progresses
    G.keeper.anim = Math.min(1, G.keeper.anim + dt / 320);
    if (p >= 1) resolveShot();
  }

  if (G.screen === "feedback") {
    G.keeper.anim = Math.min(1, G.keeper.anim + dt / 320);
    if (G.t > 1300) afterFeedback();
  }
}

/* ============================================================
   RENDER dispatch
   ============================================================ */
function render(dt) {
  ctx.clearRect(0, 0, CW, CH);
  switch (G.screen) {
    case "title":    drawTitle(dt); break;
    case "select":   drawSelect(); break;
    case "vs":       drawVS(); break;
    case "aim":
    case "power":
    case "shooting": drawScene(); break;
    case "feedback": drawFeedback(); break;
    case "result":   drawResult(); break;
  }
  drawRevouBadge();   // RevoU logo — persistent on every screen (branding)
}

// Always-visible RevoU logo, top-left — just the logo, no frame (like the country-select
// scene). Skipped on "select" — that backdrop already has the RevoU logo baked in.
function drawRevouBadge() {
  if (G.screen === "select") return;
  const im = IMG.revou; if (!im || !im.width) return;
  const s = CW * 0.055;                          // logo size
  const pad = CW * 0.018;
  ctx.drawImage(im, pad, pad, s, s);
}

/* ============================================================
   MAIN LOOP
   ============================================================ */
let last = 0, paused = false;
function loop(ts) {
  if (!last) last = ts;
  let dt = ts - last; last = ts;
  if (dt > 60) dt = 60;
  if (!paused) { update(dt); render(dt); }
  requestAnimationFrame(loop);
}

/* ============================================================
   INPUT — map screen coords to canvas coords
   ============================================================ */
function canvasPos(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) / r.width * CW,
    y: (clientY - r.top) / r.height * CH,
  };
}
function zoneAt(x, y) {
  for (let i = 0; i < ZONES.length; i++) {
    const z = ZONES[i];
    // generous hit area (zone rectangle around the circle)
    if (Math.hypot(x - z.x, y - z.y) <= AIM_R * 2.0) return i;
  }
  return -1;
}
function rectAt(x, y) {
  for (const r of SELECT_RECTS) if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return r;
  return null;
}

function onMove(x, y) {
  if (G.screen === "aim") G.hoverZone = zoneAt(x, y);
  else if (G.screen === "select") G.hoverRect = rectAt(x, y);
}
function onTap(x, y) {
  audio(); // unlock on first gesture
  loadSamples(); // decode AI SFX after the unlock gesture
  switch (G.screen) {
    case "title":
      uiClick(); openEmailGate(); break;
    case "select": {
      const r = rectAt(x, y);
      if (r) { uiClick(); G.shooter = r.country; assignRival(); startNewGame(); setScreen("vs"); }
      break;
    }
    case "vs":
      uiClick(); setScreen("aim"); break;
    case "aim": {
      const zi = zoneAt(x, y);
      if (zi >= 0) lockZone(zi);
      break;
    }
    case "power":
      lockPower(); break;
    case "result": {
      if (G.score === 0 && !G.replayed) {
        // PLAY AGAIN button hotspot (matches the code-drawn button)
        const b = resultButtonRect();
        // generous vertical padding so the tap lands even before the button fully fades in
        if (x >= b.bx && x <= b.bx+b.bw && y >= b.by-10 && y <= b.by+b.bh+10) {
          uiClick();
          G.replayed = true;
          G.shooter = null; G.rival = null;
          setScreen("select");
        }
      }
      break;
    }
  }
}

// Resume intro playback on the first user gesture (covers browsers that block autoplay).
window.addEventListener("pointerdown", playIntroVid, { once: true });

canvas.addEventListener("mousemove", e => { const p = canvasPos(e.clientX, e.clientY); onMove(p.x, p.y); });
canvas.addEventListener("click", e => { const p = canvasPos(e.clientX, e.clientY); onTap(p.x, p.y); });
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  const t = e.changedTouches[0]; const p = canvasPos(t.clientX, t.clientY);
  onMove(p.x, p.y); onTap(p.x, p.y);
}, { passive: false });

// Keyboard: SPACE / ENTER. In power it locks power (the guide's step 2).
// In aim it locks the currently hovered zone (mouse users); on other screens it advances.
window.addEventListener("keydown", e => {
  if (e.code !== "Space" && e.code !== "Enter") return;
  e.preventDefault();
  audio(); loadSamples();
  switch (G.screen) {
    case "title":  uiClick(); openEmailGate(); break;
    case "vs":     uiClick(); setScreen("aim"); break;
    case "aim":
      if (G.hoverZone >= 0) lockZone(G.hoverZone);
      break;
    case "power":  lockPower(); break;
    case "result":
      if (G.score === 0 && !G.replayed) { uiClick(); G.replayed = true; G.shooter = null; G.rival = null; setScreen("select"); }
      break;
    // select needs a specific flag -> keyboard can't pick; ignore
  }
});

/* ============================================================
   RESPONSIVE SIZING + mobile landscape gate
   ============================================================ */
function fitCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // Leave a small margin so the framed canvas floats inside the navy backdrop.
  const pad = Math.round(Math.min(vw, vh) * 0.03);
  const availW = vw - pad * 2, availH = vh - pad * 2;
  const scale = Math.min(availW / CW, availH / CH);
  const w = CW * scale, h = CH * scale;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
}
const rotateEl = document.getElementById("rotate");
function isMobile() {
  return window.matchMedia("(pointer: coarse)").matches || ("ontouchstart" in window);
}
function checkOrientation() {
  const portrait = window.matchMedia("(orientation: portrait)").matches;
  const gate = isMobile() && portrait;
  rotateEl.classList.toggle("show", gate);
  paused = gate;
  if (!gate) last = 0; // reset dt so no huge jump after resume
}
window.addEventListener("resize", () => { fitCanvas(); checkOrientation(); });
window.addEventListener("orientationchange", () => { setTimeout(() => { fitCanvas(); checkOrientation(); }, 100); });

/* ============================================================
   EMAIL GATE UI WIRING
   ============================================================ */
const gateEl   = document.getElementById("emailGate");
const inputEl  = document.getElementById("emailInput");
const errEl    = document.getElementById("emailErr");
const submitEl = document.getElementById("emailBtn");

function openEmailGate() {
  errEl.textContent = "";
  inputEl.value = "";
  submitEl.disabled = false;
  gateEl.classList.add("show");
  paused = true;                        // freeze the render loop behind the overlay
  setTimeout(() => inputEl.focus(), 50);
}
function closeEmailGate() {
  gateEl.classList.remove("show");
  paused = false;
  last = 0;                             // reset dt so no huge jump after resume
}
function submitEmail() {
  const email = (inputEl.value || "").trim().toLowerCase();
  if (!validEmail(email)) { errEl.textContent = "Masukkan email yang valid."; return; }
  if (isEmailUsed(email)) { errEl.textContent = "Email ini sudah dipakai. 1 email = 1 kesempatan."; return; }
  PLAYER_EMAIL = email;
  markEmailUsed(email);
  submitEl.disabled = true;
  uiClick();
  closeEmailGate();
  setScreen("select");
}
submitEl.addEventListener("click", submitEmail);
inputEl.addEventListener("keydown", e => {
  e.stopPropagation();                  // don't let SPACE/ENTER reach the game handler
  if (e.key === "Enter") submitEmail();
});
inputEl.addEventListener("input", () => { errEl.textContent = ""; });

/* ============================================================
   BOOT
   ============================================================ */
loadAssets(() => {
  document.getElementById("loader").style.display = "none";
  fitCanvas();
  checkOrientation();
  requestAnimationFrame(loop);
});

})();
</script>
</body>
</html>
